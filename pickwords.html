<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pickwords – учи слова через ассоциации</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text: #0b1b52;
      --text-secondary: #7481a6;
      --border-light: #e5ebfa;
      --accent: #0f1c3f;
      --accent-hover: #1a2d5a;
      --error-bg: #fff1f1;
      --error-text: #ff4f4f;
      --test-bg: linear-gradient(135deg, #0f1c3f, #1e3568);
      --btn-text: white;
      --input-bg: white;
      --input-border: #d7def0;
      --card-translate-bg: #f3f7ff;
      --card-translate-border: #dbe8ff;
    }

    body.dark-mode {
      --bg: #0f1c3f;
      --card-bg: #18294f;
      --text: #e0e6f0;
      --text-secondary: #a0aac0;
      --border-light: #2a3a60;
      --accent: #3b6eff;
      --accent-hover: #5483ff;
      --error-bg: #3e1a1a;
      --error-text: #ff6b6b;
      --test-bg: linear-gradient(135deg, #18294f, #0f1c3f);
      --btn-text: white;
      --input-bg: #1c2f52;
      --input-border: #32476e;
      --card-translate-bg: #1a2c50;
      --card-translate-border: #2a3a60;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      display: flex;
      justify-content: center;
      padding: 30px 15px;
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: none;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: background 0.3s;
      position: relative;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .logo-circle {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 50%;
      position: relative;
      transition: background 0.3s;
    }

    .logo-circle::after {
      content: "";
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .brand {
      flex: 1;
    }

    .brand h1 {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .brand p {
      color: var(--accent);
      font-size: 14px;
      margin-top: 4px;
      transition: color 0.3s;
    }

    .header-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .theme-toggle,
    .lang-btn {
      background: none;
      border: 2px solid var(--accent);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      height: 38px;
      min-width: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      background: var(--card-bg);
      color: var(--text);
      padding: 0 8px;
    }

    .lang-btn.active-lang {
      background: var(--accent);
      color: white;
    }

    .theme-toggle:hover,
    .lang-btn:hover {
      background: var(--accent);
      color: white;
    }

    /* SECTIONS */
    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }

    /* MODE SELECTOR */
    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mode-option {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border-radius: 14px;
      border: 2px solid var(--input-border);
      background: var(--input-bg);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
    }

    .mode-option.active {
      border-color: var(--accent);
      background: rgba(15, 28, 63, 0.08);
      color: var(--accent);
    }

    .mode-option input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* INPUTS */
    .input-wrapper {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      height: 58px;
      border-radius: 14px;
      border: 2px solid var(--input-border);
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: var(--btn-text);
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      height: 50px;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .file-upload-label {
      height: 50px;
      width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border: 2px solid var(--input-border);
      background: var(--input-bg);
      font-size: 28px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text);
    }

    .file-upload-label:hover {
      border-color: var(--accent);
      background: rgba(15, 28, 63, 0.05);
    }

    .photo-preview {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid var(--border-light);
      margin-top: 12px;
      display: none;
    }

    /* TRANSLATION CARD */
    .translate-card {
      background: var(--card-translate-bg);
      border: 2px solid var(--card-translate-border);
      border-radius: 20px;
      padding: 18px;
      transition: background 0.3s, border-color 0.3s;
      color: var(--text);
    }

    .english-word {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .association {
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .association img,
    .association .emoji-big {
      width: 60px;
      height: 60px;
      object-fit: contain;
      vertical-align: middle;
      margin: 5px 0;
    }

    .add-btn {
      width: 100%;
      height: 48px;
      background: var(--card-bg);
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .add-btn:hover:not(:disabled) {
      background: var(--accent);
      color: white;
    }

    /* WORD LIST */
    .search-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .search-wrapper input {
      flex: 1;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .word-item {
      background: var(--card-bg);
      border: 2px solid var(--border-light);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, border-color 0.3s;
    }

    .word-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .word-left img,
    .word-left .emoji-small {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 10px;
    }

    .emoji-small {
      font-size: 32px;
      line-height: 40px;
      text-align: center;
    }

    .word-pair {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ru {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .en {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .delete-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      background: var(--error-bg);
      color: var(--error-text);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* TEST BLOCK */
    .test-box {
      background: var(--test-bg);
      border-radius: 22px;
      padding: 22px;
      color: white;
    }

    .test-box h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .test-box p {
      line-height: 1.5;
      opacity: 0.95;
      margin-bottom: 18px;
    }

    .test-btn {
      width: 100%;
      height: 52px;
      border-radius: 16px;
      border: none;
      background: white;
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .quiz-container {
      margin-top: 18px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px;
      color: white;
    }

    .quiz-image {
      max-width: 100%;
      max-height: 200px;
      display: block;
      margin: 0 auto 12px;
      border-radius: 12px;
    }

    .quiz-emoji {
      font-size: 70px;
      text-align: center;
      display: block;
      margin: 0 auto 12px;
    }

    .quiz-container input {
      background: white;
      border: none;
      color: #0b1b52;
      width: 100%;
      min-height: 54px;
    }

    .quiz-feedback {
      margin-top: 10px;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* MOBILE */
    @media (max-width: 520px) {
      .input-wrapper {
        flex-direction: column;
      }
      #russianWordPhoto,
      #russianWordCartoon {
        min-height: 64px;
        height: 64px;
        font-size: 18px;
      }
      #translateBtnPhoto,
      #translateBtnCartoon,
      .file-upload-label {
        min-height: 64px;
        height: 64px;
      }
      .file-upload-label {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <div class="header">
      <div class="logo-icon">
        <div class="logo-circle"></div>
      </div>
      <div class="brand">
        <h1>pickwords</h1>
        <p>учи слова через ассоциации</p>
      </div>
      <div class="header-controls">
        <button type="button" class="lang-btn active-lang" id="langEnBtn" title="Английский">🇬🇧 EN</button>
        <button type="button" class="lang-btn" id="langEsBtn" title="Испанский">🇪🇸 ES</button>
        <button type="button" class="theme-toggle" id="themeToggle" title="Переключить тему">🌓</button>
      </div>
    </div>

    <!-- РЕЖИМ РАБОТЫ -->
    <div class="section">
      <div class="section-title">Режим добавления</div>
      <div class="mode-selector" id="modeSelector">
        <label class="mode-option active">
          <input type="radio" name="addMode" value="cartoon" checked> 😀 Эмодзи
        </label>
        <label class="mode-option">
          <input type="radio" name="addMode" value="photo"> 📸 Фото
        </label>
      </div>
    </div>

    <!-- ВВОД СЛОВА -->
    <div class="section" id="inputSection">
      <div class="section-title">Введите слово на русском</div>

      <!-- Панель ФОТО -->
      <div id="photoPanel" class="hidden">
        <div class="input-wrapper">
          <label for="russianWordPhoto" class="visually-hidden">Слово на русском для режима Фото</label>
          <input type="text" id="russianWordPhoto" placeholder="Например: собака" autocomplete="off">
          <label for="photoFileInput" class="file-upload-label">📷</label>
          <input type="file" id="photoFileInput" accept="image/*" capture="environment" style="display: none;">
          <button type="button" class="btn" id="translateBtnPhoto">Перевести</button>
        </div>
        <img id="photoPreview" class="photo-preview" src="#" alt="Предпросмотр фото">
      </div>

      <!-- Панель МУЛЬТЯШ (эмодзи) -->
      <div id="cartoonPanel">
        <div class="input-wrapper">
          <label for="russianWordCartoon" class="visually-hidden">Слово на русском для режима Эмодзи</label>
          <input type="text" id="russianWordCartoon" placeholder="Например: собака" autocomplete="off">
          <button type="button" class="btn" id="translateBtnCartoon">Перевести</button>
        </div>
      </div>
    </div>

    <!-- КАРТОЧКА ПЕРЕВОДА -->
    <div class="section hidden" id="translationSection">
      <div class="section-title">Перевод</div>
      <div class="translate-card">
        <div class="english-word" id="englishWordDisplay">dog</div>
        <div class="association" id="associationDisplay">
          Ассоциация:<br>
          <span id="associationText"></span>
          <div id="associationMedia"></div>
        </div>
        <div id="manualEngBlock" class="hidden" style="margin-bottom:12px;">
          <label for="manualEnglish" class="visually-hidden">Введите перевод вручную</label>
          <input type="text" id="manualEnglish" placeholder="Введите перевод" style="width:100%;">
        </div>
        <button type="button" class="add-btn" id="addWordBtn" disabled>+ Добавить в словарь</button>
      </div>
    </div>

    <!-- МОЙ СЛОВАРЬ -->
    <div class="section">
      <div class="section-title">Мой словарь (<span id="wordCount">0</span>)</div>
      <div class="search-wrapper">
        <label for="searchInput" class="visually-hidden">Поиск по словам</label>
        <input type="text" id="searchInput" placeholder="🔍 Поиск по словам..." autocomplete="off">
      </div>
      <div class="word-list" id="wordListContainer"></div>
    </div>

    <!-- ТЕСТ -->
    <div class="section">
      <div class="test-box" id="testBox">
        <h3>Проверка знаний</h3>
        <p>Пройдите тест из 10 случайных слов, которые вы уже добавили в словарь.</p>
        <button type="button" class="test-btn" id="startQuizBtn">Начать тест</button>
        <div id="quizArea" class="quiz-container hidden">
          <p>Вопрос <span id="qIndex"></span> из <span id="qTotal"></span></p>
          <p id="quizProgressText">Проверено: 0 / 0 | Верно: 0 | Ошибки: 0</p>
          <div id="quizImageContainer"></div>
          <label for="quizAnswer" class="visually-hidden">Ваш ответ</label>
          <input type="text" id="quizAnswer" placeholder="Введите перевод" autocomplete="off">
          <button type="button" class="btn" id="checkAnswerBtn" style="margin-top:10px; width:100%; background:white; color:#0f1c3f;">✅ Проверить</button>
          <div id="quizFeedback" class="quiz-feedback"></div>
        </div>
        <div id="quizEnd" class="hidden" style="text-align:center; margin-top:16px;">
          <p style="font-size:18px; font-weight:bold;">🏁 Результат: <span id="quizScore"></span></p>
          <p id="quizSummaryText"></p>
          <button type="button" class="test-btn" id="restartQuizBtn" style="margin-top:12px;">🔁 Пройти ещё раз</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Подключаем словари -->
  <script src="emoji-map.js"></script>

  <script>
    // =============== МИГРАЦИЯ ДАННЫХ ===============
    let cards = JSON.parse(localStorage.getItem('pickwords_cards') || '[]');
    // Миграция со старой структуры (english) на новую (translations)
    if (cards.length && !cards[0].translations) {
      cards = cards.map(card => ({
        russian: card.russian || '',
        translations: card.english ? { en: card.english } : { en: '' },
        image: card.image || '',
        type: card.type || 'cartoon'
      }));
    }
    function saveCards() {
      localStorage.setItem('pickwords_cards', JSON.stringify(cards));
    }

    // =============== ПЕРЕМЕННЫЕ ===============
    let currentLanguage = localStorage.getItem('pickwords_lang') || 'en'; // en / es

    // =============== УТИЛИТЫ ===============
    function getTranslation(ruWord) {
      const entry = dictionary[ruWord];
      return entry ? entry[currentLanguage] || '' : '';
    }

    function getEmojiForWord(ruWord, translation) {
      // ищем эмодзи по английскому варианту (если есть) или по переводу
      const entry = dictionary[ruWord];
      const eng = entry?.en || translation;
      return emojiMap[eng] || '❓';
    }

    function compressImage(file, maxWidth = 400, quality = 0.5) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxWidth && width >= height) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            } else if (height > maxWidth) {
              width = (width * maxWidth) / height;
              height = maxWidth;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // =============== DOM ЭЛЕМЕНТЫ ===============
    const modeSelector = document.getElementById('modeSelector');
    const photoPanel = document.getElementById('photoPanel');
    const cartoonPanel = document.getElementById('cartoonPanel');
    const translationSection = document.getElementById('translationSection');
    const englishWordDisplay = document.getElementById('englishWordDisplay');
    const associationText = document.getElementById('associationText');
    const associationMedia = document.getElementById('associationMedia');
    const manualEngBlock = document.getElementById('manualEngBlock');
    const manualEnglish = document.getElementById('manualEnglish');
    const addWordBtn = document.getElementById('addWordBtn');
    const russianWordPhoto = document.getElementById('russianWordPhoto');
    const photoFileInput = document.getElementById('photoFileInput');
    const photoPreview = document.getElementById('photoPreview');
    const translateBtnPhoto = document.getElementById('translateBtnPhoto');
    const russianWordCartoon = document.getElementById('russianWordCartoon');
    const translateBtnCartoon = document.getElementById('translateBtnCartoon');
    const searchInput = document.getElementById('searchInput');
    const wordListContainer = document.getElementById('wordListContainer');
    const wordCountSpan = document.getElementById('wordCount');
    const themeToggle = document.getElementById('themeToggle');
    const langEnBtn = document.getElementById('langEnBtn');
    const langEsBtn = document.getElementById('langEsBtn');
    // Тест
    const startQuizBtn = document.getElementById('startQuizBtn');
    const quizArea = document.getElementById('quizArea');
    const quizEnd = document.getElementById('quizEnd');
    const quizImageContainer = document.getElementById('quizImageContainer');
    const quizAnswer = document.getElementById('quizAnswer');
    const checkAnswerBtn = document.getElementById('checkAnswerBtn');
    const quizFeedback = document.getElementById('quizFeedback');
    const quizScoreSpan = document.getElementById('quizScore');
    const quizProgressText = document.getElementById('quizProgressText');
    const quizSummaryText = document.getElementById('quizSummaryText');
    const restartQuizBtn = document.getElementById('restartQuizBtn');

    // =============== СОСТОЯНИЕ ФОРМЫ ===============
    let currentMode = 'cartoon';
    let currentPhotoDataUrl = null;
    let currentTranslation = '';
    let currentEmoji = '';

    // =============== ТЕМА ===============
    function setTheme(dark) {
      if (dark) {
        document.body.classList.add('dark-mode');
        themeToggle.textContent = '☀️';
        localStorage.setItem('pickwords_theme', 'dark');
      } else {
        document.body.classList.remove('dark-mode');
        themeToggle.textContent = '🌙';
        localStorage.setItem('pickwords_theme', 'light');
      }
    }

    const savedTheme = localStorage.getItem('pickwords_theme');
    setTheme(savedTheme === 'dark');

    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark-mode');
      setTheme(!isDark);
    });

    // =============== ЯЗЫК ===============
    function setLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('pickwords_lang', lang);
      langEnBtn.classList.toggle('active-lang', lang === 'en');
      langEsBtn.classList.toggle('active-lang', lang === 'es');
      // Сброс перевода при смене языка
      resetTranslation();
      // Перерисовать список с новым языком
      renderWordList();
      // Обновить плэйсхолдер ручного ввода
      manualEnglish.placeholder = `Введите перевод на ${lang === 'en' ? 'английском' : 'испанском'}`;
    }

    setLanguage(currentLanguage);

    langEnBtn.addEventListener('click', () => setLanguage('en'));
    langEsBtn.addEventListener('click', () => setLanguage('es'));

    // =============== РЕЖИМ (фото/эмодзи) ===============
    function updateModeUI() {
      const labels = modeSelector.querySelectorAll('.mode-option');
      labels.forEach(l => l.classList.remove('active'));
      if (currentMode === 'photo') {
        photoPanel.classList.remove('hidden');
        cartoonPanel.classList.add('hidden');
        modeSelector.querySelector('input[value="photo"]').parentElement.classList.add('active');
      } else {
        photoPanel.classList.add('hidden');
        cartoonPanel.classList.remove('hidden');
        modeSelector.querySelector('input[value="cartoon"]').parentElement.classList.add('active');
      }
    }

    modeSelector.addEventListener('change', (e) => {
      if (e.target.name === 'addMode') {
        currentMode = e.target.value;
        updateModeUI();
        resetTranslation();
      }
    });

    function resetTranslation() {
      translationSection.classList.add('hidden');
      currentPhotoDataUrl = null;
      currentTranslation = '';
      currentEmoji = '';
      photoPreview.style.display = 'none';
      photoPreview.src = '#';
      manualEngBlock.classList.add('hidden');
      addWordBtn.disabled = true;
      russianWordPhoto.value = '';
      russianWordCartoon.value = '';
      photoFileInput.value = '';
    }

    // =============== ЗАГРУЗКА ФОТО ===============
    photoFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      currentPhotoDataUrl = await compressImage(file);
      photoPreview.src = currentPhotoDataUrl;
      photoPreview.style.display = 'block';
      checkAddButton();
    });

    // =============== ПЕРЕВОД ===============
    function handleTranslate(ruInput) {
      const ru = ruInput.value.trim().toLowerCase();
      if (!ru) return;
      const translation = getTranslation(ru);
      showTranslation(ru, translation);
      if (!translation) {
        manualEngBlock.classList.remove('hidden');
        manualEnglish.value = '';
      } else {
        manualEngBlock.classList.add('hidden');
      }
    }

    translateBtnPhoto.addEventListener('click', () => handleTranslate(russianWordPhoto));
    translateBtnCartoon.addEventListener('click', () => handleTranslate(russianWordCartoon));

    function showTranslation(ruWord, translation) {
      currentTranslation = translation || '';
      englishWordDisplay.textContent = translation || '?';
      associationText.textContent = translation
        ? `Ассоциация: ${translation} = ...`
        : 'Слово не найдено. Введите перевод вручную.';

      associationMedia.innerHTML = '';
      if (translation && currentMode === 'cartoon') {
        currentEmoji = getEmojiForWord(ruWord, translation);
        const span = document.createElement('span');
        span.style.fontSize = '48px';
        span.textContent = currentEmoji;
        associationMedia.appendChild(span);
      } else if (translation && currentMode === 'photo' && currentPhotoDataUrl) {
        const img = document.createElement('img');
        img.src = currentPhotoDataUrl;
        img.alt = 'Ассоциативное изображение';
        img.style.width = '80px';
        img.style.height = '80px';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '12px';
        associationMedia.appendChild(img);
      }

      translationSection.classList.remove('hidden');
      checkAddButton();
    }

    // =============== РУЧНОЙ ВВОД ===============
    manualEnglish.addEventListener('input', () => {
      currentTranslation = manualEnglish.value.trim().toLowerCase();
      englishWordDisplay.textContent = currentTranslation || '?';
      if (currentMode === 'cartoon') {
        // Для ручного ввода используем само слово как ключ для эмодзи (может не найтись)
        currentEmoji = emojiMap[currentTranslation] || '❓';
        associationMedia.innerHTML = '';
        const span = document.createElement('span');
        span.style.fontSize = '48px';
        span.textContent = currentEmoji;
        associationMedia.appendChild(span);
      }
      checkAddButton();
    });

    // =============== КНОПКА ДОБАВЛЕНИЯ ===============
    function checkAddButton() {
      const ru = currentMode === 'photo' ? russianWordPhoto.value.trim() : russianWordCartoon.value.trim();
      const hasMedia = currentMode === 'photo' ? !!currentPhotoDataUrl : true;
      addWordBtn.disabled = !(ru && currentTranslation && hasMedia);
    }

    russianWordPhoto.addEventListener('input', () => { if (currentMode === 'photo') checkAddButton(); });
    russianWordCartoon.addEventListener('input', () => { if (currentMode === 'cartoon') checkAddButton(); });

    addWordBtn.addEventListener('click', () => {
      const ru = currentMode === 'photo' ? russianWordPhoto.value.trim() : russianWordCartoon.value.trim();
      const translation = currentTranslation;
      if (!ru || !translation) return;

      let imageData, type;
      if (currentMode === 'photo') {
        if (!currentPhotoDataUrl) return;
        imageData = currentPhotoDataUrl;
        type = 'photo';
      } else {
        imageData = currentEmoji || '❓';
        type = 'cartoon';
      }

      // Проверяем, есть ли слово в словаре; если да – берём все переводы оттуда
      const dictEntry = dictionary[ru];
      const translations = dictEntry
        ? { ...dictEntry }
        : { [currentLanguage]: translation };

      cards.push({
        russian: ru,
        translations: translations,
        image: imageData,
        type: type
      });

      saveCards();
      resetTranslation();
      russianWordPhoto.value = '';
      russianWordCartoon.value = '';
      photoFileInput.value = '';
      currentPhotoDataUrl = null;
      renderWordList();
    });

    // =============== ПОИСК И ОТРИСОВКА СПИСКА ===============
    function filterCards(query) {
      const q = query.toLowerCase().trim();
      if (!q) return cards;
      return cards.filter(card => {
        const allTranslations = Object.values(card.translations).join(' ').toLowerCase();
        return card.russian.toLowerCase().includes(q) || allTranslations.includes(q);
      });
    }

    function renderWordList() {
      const query = searchInput.value;
      const filtered = filterCards(query);
      wordCountSpan.textContent = filtered.length;
      wordListContainer.innerHTML = '';
      filtered.forEach((card) => {
        const realIndex = cards.indexOf(card);
        const item = document.createElement('div');
        item.className = 'word-item';

        const left = document.createElement('div');
        left.className = 'word-left';

        if (card.type === 'photo') {
          const img = document.createElement('img');
          img.src = card.image;
          img.alt = card.russian;
          left.appendChild(img);
        } else {
          const emojiSpan = document.createElement('span');
          emojiSpan.className = 'emoji-small';
          emojiSpan.textContent = card.image || '❓';
          left.appendChild(emojiSpan);
        }

        const pair = document.createElement('div');
        pair.className = 'word-pair';
        const ruDiv = document.createElement('div');
        ruDiv.className = 'ru';
        ruDiv.textContent = card.russian;
        const enDiv = document.createElement('div');
        enDiv.className = 'en';
        enDiv.textContent = card.translations[currentLanguage] || card.translations.en || '—';
        pair.appendChild(ruDiv);
        pair.appendChild(enDiv);
        left.appendChild(pair);
        item.appendChild(left);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '🗑';
        delBtn.addEventListener('click', () => {
          cards.splice(realIndex, 1);
          saveCards();
          renderWordList();
        });
        item.appendChild(delBtn);
        wordListContainer.appendChild(item);
      });
    }

    searchInput.addEventListener('input', renderWordList);

    // =============== ТЕСТ ===============
    let quizWords = [];
    let currentQuizIndex = 0;
    let quizScore = 0;
    let quizTotal = 0;
    let quizChecked = 0;

    startQuizBtn.addEventListener('click', startQuiz);
    restartQuizBtn.addEventListener('click', startQuiz);

    function startQuiz() {
      if (cards.length === 0) {
        alert('Сначала добавьте слова в словарь!');
        return;
      }
      const shuffled = [...cards].sort(() => Math.random() - 0.5);
      quizWords = shuffled.slice(0, Math.min(10, shuffled.length));
      currentQuizIndex = 0;
      quizScore = 0;
      quizChecked = 0;
      quizTotal = quizWords.length;
      quizArea.classList.remove('hidden');
      quizEnd.classList.add('hidden');
      startQuizBtn.parentElement.querySelector('p').style.display = 'none';
      updateQuizProgress();
      showQuestion();
    }

    function updateQuizProgress() {
      const wrong = quizChecked - quizScore;
      quizProgressText.textContent = `Проверено: ${quizChecked} / ${quizTotal} | Верно: ${quizScore} | Ошибки: ${wrong}`;
    }

    function showQuestion() {
      if (currentQuizIndex >= quizTotal) {
        quizArea.classList.add('hidden');
        quizEnd.classList.remove('hidden');
        quizScoreSpan.textContent = `${quizScore} / ${quizTotal}`;
        quizSummaryText.textContent = `Проверок: ${quizChecked}, верных: ${quizScore}, ошибок: ${quizChecked - quizScore}`;
        return;
      }
      const word = quizWords[currentQuizIndex];
      document.getElementById('qIndex').textContent = currentQuizIndex + 1;
      document.getElementById('qTotal').textContent = quizTotal;
      quizFeedback.textContent = '';
      quizAnswer.value = '';
      quizImageContainer.innerHTML = '';

      if (word.type === 'photo') {
        const img = document.createElement('img');
        img.className = 'quiz-image';
        img.src = word.image;
        img.alt = `Подсказка: ${word.russian}`;
        quizImageContainer.appendChild(img);
      } else {
        const emojiSpan = document.createElement('span');
        emojiSpan.className = 'quiz-emoji';
        emojiSpan.textContent = word.image || '❓';
        quizImageContainer.appendChild(emojiSpan);
      }
    }

    checkAnswerBtn.addEventListener('click', () => {
      const userAnswer = quizAnswer.value.trim().toLowerCase();
      const correct = quizWords[currentQuizIndex].translations[currentLanguage] || quizWords[currentQuizIndex].translations.en || '';
      quizChecked++;
      if (userAnswer === correct.toLowerCase()) {
        quizScore++;
        quizFeedback.textContent = '✅ Верно!';
      } else {
        quizFeedback.textContent = `❌ Неверно. Правильно: ${correct}`;
      }
      updateQuizProgress();
      checkAnswerBtn.disabled = true;
      setTimeout(() => {
        checkAnswerBtn.disabled = false;
        currentQuizIndex++;
        showQuestion();
      }, 1500);
    });

    // =============== ИНИЦИАЛИЗАЦИЯ ===============
    updateModeUI();
    renderWordList();
    translationSection.classList.add('hidden');
  </script>
</body>
</html>
